services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped

  edw:
    image: postgres:16
    container_name: enterprise-dw
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  glue-dev:
    image: public.ecr.aws/glue/aws-glue-libs:5
    container_name: glue-dev
    command: ["pyspark"]
    working_dir: /home/hadoop/workspace
    volumes:
      - .:/home/hadoop/workspace
      - ./docker/glue/jars:/opt/spark/jars
    env_file:
    - .env
    environment:
      PYTHONPATH: "/usr/share/aws/glue-pds:/usr/share/aws/glue-pds/PyGlue.zip:/home/hadoop/workspace/docker/glue"
    stdin_open: true
    tty: true
    depends_on:
      - sqlserver

volumes:
  sqlserver-data:
    external: true
    name: docker_sqlserver-data

  postgres-data:
    external: true
    name: docker_postgres-data